services:
  node0:
    build:
      context: ..
      dockerfile: Test_distfs/Dockerfile
    environment:
      - NODE_ID=node-0
      - META_PORT=5000
      - STORAGE_PORT=6001
    volumes:
      - ./cluster.docker.conf:/app/distfs/cluster.docker.conf
    networks:
      distfs_net:
        aliases:
          - node0

  node1:
    build:
      context: ..
      dockerfile: Test_distfs/Dockerfile
    environment:
      - NODE_ID=node-1
      - META_PORT=5001
      - STORAGE_PORT=6002
    volumes:
      - ./cluster.docker.conf:/app/distfs/cluster.docker.conf
    networks:
      distfs_net:
        aliases:
          - node1

  node2:
    build:
      context: ..
      dockerfile: Test_distfs/Dockerfile
    environment:
      - NODE_ID=node-2
      - META_PORT=5002
      - STORAGE_PORT=6003
    volumes:
      - ./cluster.docker.conf:/app/distfs/cluster.docker.conf
    networks:
      distfs_net:
        aliases:
          - node2

  client:
    build:
      context: ..
      dockerfile: Test_distfs/Dockerfile
    command: ["sleep", "infinity"]
    volumes:
      - ./cluster.docker.conf:/app/distfs/cluster.docker.conf
    networks:
      - distfs_net

networks:
  distfs_net:
    driver: bridge
